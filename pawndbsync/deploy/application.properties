# =============================================================================
#  PAWN DB SYNC  —  Machine-specific configuration
#  Edit this file with real values BEFORE running install.bat.
#  This file is copied to C:\PawnDbSync\application.properties on install.
#  It overrides everything inside the embedded JAR.
# =============================================================================

# Application
spring.application.name=pawndbsync
server.port=8081

# Scheduler
spring.task.scheduling.pool.size=2

# Cloud (Railway) PostgreSQL
cloud.datasource.url=jdbc:postgresql://nozomi.proxy.rlwy.net:26527/railway
cloud.datasource.username=postgres
cloud.datasource.password=REPLACE_CLOUD_PASSWORD

# Local PostgreSQL (change password to match this machine)
local.datasource.url=jdbc:postgresql://localhost:5432/pawnbroking
local.datasource.username=postgres
local.datasource.password=REPLACE_LOCAL_PASSWORD

# AWS S3 — file sync
aws.accessKey=REPLACE_AWS_ACCESS_KEY
aws.secretKey=REPLACE_AWS_SECRET_KEY
aws.region=eu-north-1
aws.s3.bucket=REPLACE_BUCKET_NAME
aws.s3.prefix=alwarpuram

# Disable Spring Boot auto datasource
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
