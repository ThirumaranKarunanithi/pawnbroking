# =============================================================================
#  PAWN DB SYNC  –  External configuration (edit this file per machine)
#  Place this file in the same folder as pawndbsync.jar.
#  These values override anything inside the embedded JAR.
# =============================================================================

# Application
spring.application.name=pawndbsync
server.port=8081

# Cloud (Railway) PostgreSQL — sync target
cloud.datasource.url=jdbc:postgresql://nozomi.proxy.rlwy.net:26527/railway
cloud.datasource.username=postgres
cloud.datasource.password=VQvUgHqhNxWpOTPVCKAasmfmOovAjGby

# Local PostgreSQL — source of truth (change host/port/db if different on this machine)
local.datasource.url=jdbc:postgresql://localhost:5432/pawnbroking
local.datasource.username=postgres
local.datasource.password=happy

# AWS S3 — file sync
aws.accessKey=YOUR_AWS_ACCESS_KEY_HERE
aws.secretKey=YOUR_AWS_SECRET_KEY_HERE
aws.region=eu-north-1
aws.s3.bucket=pawnbroking
aws.s3.prefix=alwarpuram


# Disable Spring Boot auto datasource
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
